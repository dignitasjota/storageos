<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sin conexión · TrasterOS</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f172a;
        color: #e2e8f0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        text-align: center;
        padding: 24px;
      }
      .card { max-width: 360px; }
      h1 { font-size: 1.25rem; margin: 16px 0 8px; }
      p { color: #94a3b8; line-height: 1.5; }
      button {
        margin-top: 20px;
        background: #3b82f6;
        color: white;
        border: 0;
        border-radius: 8px;
        padding: 10px 18px;
        font-size: 0.95rem;
        cursor: pointer;
      }
      svg { width: 64px; height: 64px; }
    </style>
  </head>
  <body>
    <div class="card">
      <svg viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="1.5">
        <path d="M3 3l18 18M10.6 5.1A9 9 0 0 1 21 12M5 12a9 9 0 0 1 3-2.6M8.5 16.5a5 5 0 0 1 7 0M12 20h.01" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <h1>Sin conexión</h1>
      <p>
        No hay conexión a internet. Algunas funciones (pago, facturas) necesitan
        red. Vuelve a intentarlo cuando recuperes la señal.
      </p>
      <button onclick="location.reload()">Reintentar</button>
    </div>
  </body>
</html>
