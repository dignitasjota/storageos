name: storageos-prod

# =============================================================================
# docker-compose.portainer.yml — Stack de PRODUCCION pensado para desplegar
# desde PORTAINER como "Git repository" (sin SSH, sin .env.prod en disco).
#
# Diferencias frente a docker-compose.prod.yml:
#   - SIN `env_file: .env.prod`. Todas las variables se inyectan por
#     `environment:` con interpolacion ${VAR}, que Portainer rellena desde su
#     seccion "Environment variables" del stack (igual que hacia el dev).
#   - Arranque 100% automatico: el rol Postgres + extensiones los crea
#     `scripts/pg-init-prod.sh` (init de Postgres); `migrate` aplica las
#     migraciones y `api`/`worker` esperan con `service_completed_successfully`;
#     `createbuckets` crea los buckets MinIO. Cero pasos manuales.
#
# COMO USARLO EN PORTAINER:
#   Stacks -> Add stack -> Repository
#     - Repository URL: <tu repo git>
#     - Compose path: docker-compose.portainer.yml
#     - Environment variables: define las del bloque de abajo marcadas ${...}
#       (genera los secretos con el bloque openssl del README de deploy).
#   Deploy. Para actualizar: "Pull and redeploy" (re-clona el repo y
#   reconstruye; marca "re-build" si Portainer lo ofrece).
#
# NOTA: api/worker/web/migrate se CONSTRUYEN localmente (sin `image:`), no se
# descargan de ningun registry. Por eso `docker compose pull` los ignora y no
# falla con "pull access denied" (solo baja postgres/redis/minio).
#
# Requiere Docker Compose v2.20+ (service_completed_successfully).
# =============================================================================

# Variables comunes a api / worker. Los hostnames internos van fijos; el resto
# se interpola desde las Environment variables de Portainer.
x-app-env: &app-env
  NODE_ENV: production
  DATABASE_URL: postgresql://${POSTGRES_APP_USER}:${POSTGRES_APP_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
  DATABASE_ADMIN_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
  REDIS_HOST: redis
  REDIS_PORT: '6379'
  REDIS_PASSWORD: ${REDIS_PASSWORD}
  REDIS_DB: '0'
  MINIO_ENDPOINT: minio
  MINIO_PORT: '9000'
  MINIO_USE_SSL: 'false'
  MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
  MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
  MINIO_BUCKET_UPLOADS: storageos-uploads
  MINIO_BUCKET_INVOICES: storageos-invoices
  MINIO_BUCKET_PLANS: storageos-plans
  MINIO_BUCKET_REPORTS: storageos-reports
  MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
  WEB_BASE_URL: ${WEB_BASE_URL:-http://localhost:3000}
  ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
  JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
  JWT_ACCESS_TTL_SECONDS: '900'
  JWT_REFRESH_TTL_SECONDS: '604800'
  JWT_2FA_PENDING_SECRET: ${JWT_2FA_PENDING_SECRET}
  JWT_2FA_PENDING_TTL_SECONDS: '300'
  MASTER_ENCRYPTION_KEY: ${MASTER_ENCRYPTION_KEY}
  COOKIE_DOMAIN: ${COOKIE_DOMAIN:-localhost}
  COOKIE_SECURE: ${COOKIE_SECURE:-true}
  COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
  STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_dummy}
  STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-pk_test_dummy}
  STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_dummy}
  AEAT_MODE: ${AEAT_MODE:-stub}
  AEAT_TENANT_TAX_ID: ${AEAT_TENANT_TAX_ID:-}
  AEAT_SISTEMA_NIF: ${AEAT_SISTEMA_NIF:-B00000000}
  AEAT_SISTEMA_NOMBRE: ${AEAT_SISTEMA_NOMBRE:-StorageOS}
  AEAT_SISTEMA_VERSION: ${AEAT_SISTEMA_VERSION:-1.0.0}
  AEAT_SISTEMA_INSTALACION: ${AEAT_SISTEMA_INSTALACION:-001}
  EMAIL_PROVIDER: ${EMAIL_PROVIDER:-smtp}
  EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-StorageOS}
  EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-no-reply@storageos.local}
  RESEND_API_KEY: ${RESEND_API_KEY:-}
  SUPER_ADMIN_JWT_SECRET: ${SUPER_ADMIN_JWT_SECRET}
  SUPER_ADMIN_JWT_TTL_SECONDS: '28800'
  SUPER_ADMIN_REFRESH_TTL_SECONDS: '604800'
  IMPERSONATION_TTL_SECONDS: '3600'
  SECURITY_BRUTE_FORCE_THRESHOLD: '5'
  SECURITY_BRUTE_FORCE_WINDOW_MINUTES: '15'
  WEBHOOK_DELIVERIES_RETENTION_DAYS: '30'
  OPENAPI_ENABLED: ${OPENAPI_ENABLED:-false}
  SENTRY_TRACES_SAMPLE_RATE: '0'
  WHATSAPP_PROVIDER: ${WHATSAPP_PROVIDER:-stub}
  LOCK_PROVIDER: ${LOCK_PROVIDER:-stub}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  LOG_PRETTY: 'false'
  # OPCIONALES de formato estricto (email/url): solo si las defines en
  # Portainer. Si las dejas vacias, NO las añadas — Zod las trata como
  # ausentes; un string vacio rompe la validacion .email()/.url().
  # SENTRY_DSN: lo añade Portainer si lo defines.
  # SECURITY_ALERT_EMAIL: idem.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Las consume scripts/pg-init-prod.sh para crear el rol restringido.
      POSTGRES_APP_USER: ${POSTGRES_APP_USER}
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD}
      PGTZ: Europe/Madrid
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Init automatico del rol + extensiones + default privileges (solo BD virgen).
      - ./scripts/pg-init-prod.sh:/docker-entrypoint-initdb.d/10-init.sh:ro
    networks:
      - storageos-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      [
        'redis-server',
        '--appendonly',
        'yes',
        '--requirepass',
        '${REDIS_PASSWORD}',
        '--maxmemory',
        '512mb',
        '--maxmemory-policy',
        'noeviction',
      ]
    volumes:
      - redis-data:/data
    networks:
      - storageos-net
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_SERVER_URL: ${MINIO_PUBLIC_URL:-}
    volumes:
      - minio-data:/data
    networks:
      - storageos-net
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  # Init-container: crea los buckets y sale. restart "no" => Portainer lo muestra
  # como "exited (0)" tras completarse; es normal.
  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 "${MINIO_ROOT_USER}" "${MINIO_ROOT_PASSWORD}" &&
        mc mb --ignore-existing local/storageos-uploads &&
        mc mb --ignore-existing local/storageos-invoices &&
        mc mb --ignore-existing local/storageos-plans &&
        mc mb --ignore-existing local/storageos-reports &&
        echo "[createbuckets] OK"
    networks:
      - storageos-net
    restart: 'no'

  # Aplica migraciones Prisma con el rol admin (bypass RLS) y sale. Idempotente.
  # Build propio (mismo Dockerfile que la API, con el CLI prisma): asi NO hay
  # `image:` que Portainer intente descargar de un registry inexistente. La
  # cache de capas reusa el build de la API, asi que es casi instantaneo.
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    working_dir: /app/node_modules/@storageos/database
    entrypoint: ['/bin/sh', '-c']
    command:
      - |
        echo "[migrate] Aplicando migraciones Prisma...";
        node /app/node_modules/prisma/build/index.js migrate deploy;
        echo "[migrate] OK";
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - storageos-net
    restart: 'no'

  # Siembra datos iniciales (planes free/starter/pro siempre; super admin si
  # defines BOOTSTRAP_SUPERADMIN_EMAIL/PASSWORD). Idempotente, corre tras
  # migrate y sale. Equivale al `pnpm db:seed` que no puede correr en prod.
  bootstrap:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    working_dir: /app
    entrypoint: ['/bin/sh', '-c']
    command:
      - node dist/scripts/bootstrap.js
    environment:
      DATABASE_ADMIN_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      BOOTSTRAP_SUPERADMIN_EMAIL: ${BOOTSTRAP_SUPERADMIN_EMAIL:-}
      BOOTSTRAP_SUPERADMIN_PASSWORD: ${BOOTSTRAP_SUPERADMIN_PASSWORD:-}
      BOOTSTRAP_SUPERADMIN_NAME: ${BOOTSTRAP_SUPERADMIN_NAME:-}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - storageos-net
    restart: 'no'

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      <<: *app-env
      # API HTTP-only: los Processors/Crons los ejecuta el `worker`.
      ENABLE_WORKERS_IN_API: 'false'
      # Opcionales de formato estricto: descomenta en Portainer solo si las usas.
      # SENTRY_DSN: ${SENTRY_DSN}
      # SECURITY_ALERT_EMAIL: ${SECURITY_ALERT_EMAIL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - storageos-net
    expose:
      - '3001'

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - storageos-net

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: '3000'
      HOSTNAME: 0.0.0.0
    depends_on:
      - api
    networks:
      - storageos-net
    expose:
      - '3000'

networks:
  storageos-net:
    name: storageos-net
    driver: bridge

volumes:
  postgres-data:
    name: storageos-postgres-data
  redis-data:
    name: storageos-redis-data
  minio-data:
    name: storageos-minio-data
