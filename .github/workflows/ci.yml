name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela ejecuciones obsoletas cuando se pushea sobre la misma rama/PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Coincide con apps/api/.env.example para que el código encuentre los servicios
  # sin tocar variables. CI levanta Postgres en el puerto 5433, Redis en 6380 y
  # Mailpit en 1026/8026 igual que docker-compose dev.
  DATABASE_URL: postgresql://storageos_app:storageos-app@localhost:5433/storageos?schema=public
  DATABASE_ADMIN_URL: postgresql://storageos:storageos@localhost:5433/storageos?schema=public
  REDIS_URL: redis://localhost:6380
  REDIS_HOST: localhost
  REDIS_PORT: '6380'
  REDIS_DB: '0'
  SMTP_HOST: localhost
  SMTP_PORT: '1026'
  SMTP_FROM: no-reply@storageos.local
  SMTP_FROM_NAME: StorageOS
  WEB_BASE_URL: http://localhost:3000
  MAILPIT_API: http://localhost:8026

jobs:
  lint-typecheck-build:
    name: Lint, typecheck & build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Necesario antes de typecheck/build porque el postinstall de @prisma/client
      # no localiza el schema desde la raíz del monorepo.
      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Build shared package
        run: pnpm -F @storageos/shared build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
        env:
          # `NEXT_PUBLIC_*` se inyecta en build-time; varias páginas (p. ej.
          # /units/import, /contracts/import) leen NEXT_PUBLIC_API_URL al cargar
          # el módulo y el prerender falla si no está. Valor dummy: solo se
          # valida que exista; en prod la inyecta el build de Docker.
          NEXT_PUBLIC_API_URL: http://localhost:3001

  test-database:
    name: Tests database (Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: storageos
          POSTGRES_PASSWORD: storageos
          POSTGRES_DB: storageos
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U storageos -d storageos"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Apply migrations (admin role + storageos_app + RLS)
        run: pnpm -F @storageos/database migrate:deploy
        env:
          DATABASE_URL: ${{ env.DATABASE_ADMIN_URL }}

      # seed.test.ts y rls.test.ts (subscription_plans) leen datos sembrados;
      # sin esto fallan con tablas vacías.
      - name: Seed demo data
        run: pnpm db:seed
        env:
          DATABASE_URL: ${{ env.DATABASE_ADMIN_URL }}

      - name: Run Vitest
        # Vitest necesita `DATABASE_URL` apuntando al rol admin (storageos);
        # `tests/setup.ts` deriva `DATABASE_URL_APP` reemplazando el rol.
        env:
          DATABASE_URL: ${{ env.DATABASE_ADMIN_URL }}
        run: pnpm -F @storageos/database test

  test-api-e2e:
    name: Tests API e2e (Jest + Supertest)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: storageos
          POSTGRES_PASSWORD: storageos
          POSTGRES_DB: storageos
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U storageos -d storageos"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

      mailpit:
        image: axllent/mailpit:latest
        ports:
          - 1026:1025
          - 8026:8025
        options: >-
          --health-cmd="wget -q -O- http://localhost:8025/api/v1/info || exit 1"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

      # bitnami/minio arranca el server automáticamente (MinIO oficial no se
      # puede usar como `services:` porque requiere `command: server /data`,
      # que la sintaxis de services no soporta). El test de reports sube un
      # xlsx real al bucket `storageos-reports`. Mapeado a 9010 para casar con
      # los defaults de env.schema (MINIO_ENDPOINT=localhost, MINIO_PORT=9010).
      minio:
        image: bitnami/minio:latest
        env:
          MINIO_ROOT_USER: ci-minio-access
          MINIO_ROOT_PASSWORD: ci-minio-secret-dev-only
          MINIO_DEFAULT_BUCKETS: storageos-uploads,storageos-invoices,storageos-plans,storageos-reports
        ports:
          - 9010:9000

    env:
      # Secrets en CI no son sensibles (son tests); estos valores reproducen
      # un .env de desarrollo. NUNCA reutilizar en producción.
      NODE_ENV: test
      JWT_ACCESS_SECRET: ci-test-access-secret-with-32-chars-min-length-aaa
      JWT_ACCESS_TTL_SECONDS: '900'
      JWT_REFRESH_TTL_SECONDS: '604800'
      JWT_2FA_PENDING_SECRET: ci-test-2fa-pending-secret-32chars-min-bbbbbbb
      JWT_2FA_PENDING_TTL_SECONDS: '300'
      SUPER_ADMIN_JWT_SECRET: ci-test-superadmin-secret-32chars-min-cccccccc
      SUPER_ADMIN_REFRESH_TTL_SECONDS: '604800'
      MASTER_ENCRYPTION_KEY: 'AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA='
      COOKIE_DOMAIN: localhost
      COOKIE_SECURE: 'false'
      COOKIE_SAMESITE: lax
      ALLOWED_ORIGINS: http://localhost:3000
      AEAT_MODE: stub
      AEAT_SISTEMA_NIF: B00000000
      AEAT_SISTEMA_NOMBRE: StorageOS
      AEAT_SISTEMA_VERSION: 1.0.0
      AEAT_SISTEMA_INSTALACION: '001'
      AEAT_SANDBOX_ENDPOINT: https://prewww1.aeat.es/wlpl/TIKE-CONT/ws/SistemaFacturacion/SistemaFacturacionV1
      AEAT_PRODUCTION_ENDPOINT: https://www1.agenciatributaria.gob.es/wlpl/TIKE-CONT/ws/SistemaFacturacion/SistemaFacturacionV1
      AEAT_TIMEOUT_MS: '30000'
      LOCK_PROVIDER: stub
      EMAIL_PROVIDER: smtp
      LOG_LEVEL: fatal
      LOG_PRETTY: 'false'
      # MinIO real (service `minio` arriba): el test de reports sube un xlsx al
      # bucket. El access/secret deben coincidir con MINIO_ROOT_USER/PASSWORD.
      MINIO_ENDPOINT: localhost
      MINIO_PORT: '9010'
      MINIO_USE_SSL: 'false'
      MINIO_PUBLIC_URL: http://localhost:9010
      MINIO_ACCESS_KEY: ci-minio-access
      MINIO_SECRET_KEY: ci-minio-secret-dev-only

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Build shared package
        run: pnpm -F @storageos/shared build

      # Jest resuelve `@storageos/database` por node (→ dist/), así que el
      # paquete debe estar compilado (el tsconfig raíz mapea a src solo para
      # typecheck, no para el runtime de jest).
      - name: Build database package
        run: pnpm -F @storageos/database build

      - name: Apply migrations (crea storageos_app + RLS)
        run: pnpm -F @storageos/database migrate:deploy
        env:
          DATABASE_URL: ${{ env.DATABASE_ADMIN_URL }}

      # `register` exige el plan `starter`; sin seed devuelve 500.
      - name: Seed demo data
        run: pnpm db:seed
        env:
          DATABASE_URL: ${{ env.DATABASE_ADMIN_URL }}

      # bitnami/minio no expone health-cmd fiable; esperamos desde el runner.
      - name: Wait for MinIO
        run: |
          for i in $(seq 1 30); do
            if curl -fs http://localhost:9010/minio/health/live >/dev/null 2>&1; then
              echo "MinIO up"; exit 0
            fi
            sleep 2
          done
          echo "::error::MinIO no respondió en 60s"; exit 1

      # El script `test:e2e` ya incluye `--runInBand`; pasar `-- --runInBand`
      # extra hacía que jest lo tratara como patrón de ruta → "No tests found".
      - name: Run API e2e tests
        run: pnpm -F api test:e2e
