name: E2E Playwright

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Smoke E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: storageos
          POSTGRES_PASSWORD: storageos
          POSTGRES_DB: storageos
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U storageos -d storageos"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

      mailpit:
        image: axllent/mailpit:latest
        ports:
          - 1026:1025
          - 8026:8025
        options: >-
          --health-cmd="wget --quiet --spider http://localhost:8025/livez || exit 1"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://storageos_app:storageos-app@localhost:5433/storageos?schema=public
      DATABASE_ADMIN_URL: postgresql://storageos:storageos@localhost:5433/storageos?schema=public
      REDIS_URL: redis://localhost:6380
      REDIS_HOST: localhost
      REDIS_PORT: '6380'
      JWT_ACCESS_SECRET: e2e-test-access-secret-with-32-chars-aaaaaaaaaa
      JWT_ACCESS_TTL_SECONDS: '900'
      JWT_REFRESH_TTL_SECONDS: '604800'
      JWT_2FA_PENDING_SECRET: e2e-test-2fa-pending-32chars-bbbbbbbbbbbbbb
      JWT_2FA_PENDING_TTL_SECONDS: '300'
      SUPER_ADMIN_JWT_SECRET: e2e-test-superadmin-32chars-cccccccccccccc
      SUPER_ADMIN_REFRESH_TTL_SECONDS: '604800'
      MASTER_ENCRYPTION_KEY: 'AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA='
      COOKIE_DOMAIN: localhost
      COOKIE_SECURE: 'false'
      COOKIE_SAMESITE: lax
      ALLOWED_ORIGINS: http://localhost:3000
      SMTP_HOST: localhost
      SMTP_PORT: '1026'
      SMTP_FROM: no-reply@storageos.local
      SMTP_FROM_NAME: StorageOS
      WEB_BASE_URL: http://localhost:3000
      MAILPIT_API: http://localhost:8026
      AEAT_MODE: stub
      LOCK_PROVIDER: stub
      EMAIL_PROVIDER: smtp
      LOG_LEVEL: fatal
      LOG_PRETTY: 'false'
      MINIO_ACCESS_KEY: ci-minio-access
      MINIO_SECRET_KEY: ci-minio-secret-dev-only
      NEXT_PUBLIC_API_URL: http://localhost:3001

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Build shared package
        run: pnpm -F @storageos/shared build

      # `@storageos/database` expone sus tipos desde dist/ (./dist/index.d.ts).
      # Sin compilarlo, `nest build` no resuelve `@storageos/database` y la
      # build de la API falla con cientos de errores TS en cascada.
      - name: Build database package
        run: pnpm -F @storageos/database build

      - name: Apply migrations
        run: pnpm -F @storageos/database migrate:deploy
        env:
          DATABASE_URL: ${{ env.DATABASE_ADMIN_URL }}

      - name: Seed demo data
        run: pnpm db:seed
        env:
          DATABASE_URL: ${{ env.DATABASE_ADMIN_URL }}

      # El smoke test 04 (super admin + impersonación) necesita un super admin
      # precreado. Sin esto el gate sería rojo permanentemente.
      - name: Seed super admin
        run: >-
          pnpm --filter @storageos/database seed:superadmin --
          --email admin@storageos.local --password 'Admin69!' --name 'Admin E2E'
        env:
          DATABASE_URL: ${{ env.DATABASE_ADMIN_URL }}

      - name: Install Playwright browsers
        run: pnpm -F web exec playwright install --with-deps chromium

      - name: Build API
        run: pnpm -F api build

      - name: Build web (standalone)
        run: pnpm -F web build

      # Arrancamos API + web en background con logs a fichero. Las esperas
      # FALLAN (exit 1) si el servicio no responde a tiempo: como gate
      # bloqueante, preferimos un fallo claro a un Playwright con errores
      # confusos de conexión.
      - name: Start servers (background)
        run: |
          NODE_ENV=production pnpm -F api start > /tmp/api.log 2>&1 &
          NEXT_PUBLIC_API_URL=http://localhost:3001 PORT=3000 pnpm -F web start > /tmp/web.log 2>&1 &

      - name: Wait for API + web (fail fast)
        run: |
          wait_for() {
            local name="$1" url="$2" log="$3"
            for i in $(seq 1 60); do
              if curl -fs "$url" >/dev/null 2>&1; then echo "$name up"; return 0; fi
              sleep 2
            done
            echo "::error::$name no arrancó tras 120s"; echo "--- $log ---"; cat "$log" || true
            return 1
          }
          wait_for API http://localhost:3001/health /tmp/api.log
          wait_for Web http://localhost:3000 /tmp/web.log

      - name: Run Playwright tests
        run: pnpm -F web test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          PLAYWRIGHT_API_URL: http://localhost:3001
          MAILPIT_API_URL: http://localhost:8026/api/v1
          E2E_ADMIN_EMAIL: admin@storageos.local
          E2E_ADMIN_PASSWORD: 'Admin69!'

      - name: Server logs (on failure)
        if: failure()
        run: |
          echo "=== API log ==="; cat /tmp/api.log || true
          echo "=== Web log ==="; cat /tmp/web.log || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
