name: storageos

# Entorno de desarrollo. Sólo expone puertos en 127.0.0.1 y los remapea
# (+1 respecto a los puertos estándar) para no chocar con otros proyectos
# que estén corriendo en la misma máquina.
#
#   Host           Contenedor      Servicio
#   ----           ----------      --------
#   5433           5432            Postgres
#   6380           6379            Redis
#   9010           9000            MinIO API
#   9011           9001            MinIO Console
#   1026           1025            Mailpit SMTP
#   8026           8025            Mailpit UI

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '127.0.0.1:5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '127.0.0.1:6380:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - '127.0.0.1:9010:9000'
      - '127.0.0.1:9011:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 10

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/storageos-uploads;
        mc mb --ignore-existing local/storageos-invoices;
        mc mb --ignore-existing local/storageos-plans;
        echo 'Buckets listos.';
        exit 0;

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - '127.0.0.1:1026:1025'
      - '127.0.0.1:8026:8025'

volumes:
  postgres_data:
  redis_data:
  minio_data:
