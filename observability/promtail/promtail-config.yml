# Promtail descubre los contenedores via el socket de Docker y envía sus logs
# a Loki. Etiqueta cada flujo por servicio de compose para poder filtrar en
# Grafana (`service="api"`, `service="worker"`, `service="web"`).
server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
    relabel_configs:
      # Solo contenedores del stack StorageOS.
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        regex: '(storageos.*)'
        action: keep
      # `service` = nombre del servicio en el compose (api/worker/web/...).
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - target_label: 'job'
        replacement: 'storageos'
    pipeline_stages:
      # api/worker: logs pino JSON → extrae nivel y mensaje.
      - match:
          selector: '{service=~"api|worker"}'
          stages:
            - json:
                expressions:
                  level: level
                  msg: msg
            - template:
                source: level_name
                template: '{{ if eq .level "50" }}error{{ else if eq .level "40" }}warn{{ else if eq .level "30" }}info{{ else if eq .level "60" }}fatal{{ else }}other{{ end }}'
            - labels:
                level: level_name
      # web (Next.js): las violaciones CSP salen como JSON {"evt":"csp_violation",...}.
      - match:
          selector: '{service="web"}'
          stages:
            - json:
                expressions:
                  evt: evt
            - labels:
                evt: evt
